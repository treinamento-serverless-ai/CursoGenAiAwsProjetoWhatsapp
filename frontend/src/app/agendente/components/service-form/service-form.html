<div class="form-container">
  @if (loading) {
    <div class="loading-overlay">
      <mat-spinner></mat-spinner>
    </div>
  }

  <div class="form-header">
    <h1>{{ isEdit ? 'Editar' : 'Novo' }} Servico</h1>
    <a routerLink="/services" class="btn-back">Voltar</a>
  </div>

  @if (loading) {
    <div class="loading">Carregando...</div>
  } @else {
    <form (ngSubmit)="save()">
      <div class="form-group">
        <label>Nome *</label>
        <input type="text" [(ngModel)]="service.name" name="name" required />
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea [(ngModel)]="service.description" name="description"></textarea>
      </div>

      <div class="form-group">
        <label>Categoria</label>
        <input
          type="text"
          [(ngModel)]="service.category"
          name="category"
          placeholder="Ex: Cabelo, Barba, Combo"
        />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save" [disabled]="saving">
          {{ saving ? 'Salvando...' : 'Salvar' }}
        </button>
      </div>
    </form>
  }
</div>
